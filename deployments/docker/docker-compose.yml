name: nexus-erp

services:

  # =========================================================
  # POSTGRESQL
  # =========================================================
  postgres:
    image: postgres:17-alpine
    container_name: nexus-postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: nexus_user
      POSTGRES_PASSWORD: nexus_password
      POSTGRES_DB: nexus_erp_db

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus_user -d nexus_erp_db || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - nexus-network



  # =========================================================
  # REDIS
  # =========================================================
  redis:
    image: redis:7-alpine
    container_name: nexus-redis
    restart: unless-stopped

    command: >
      redis-server
      --appendonly yes
      --requirepass nexus_redis_password

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "-a", "nexus_redis_password", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - nexus-network



  # =========================================================
  # KAFKA (KRaft Mode - No ZooKeeper)
  # =========================================================
  kafka:
    image: confluentinc/cp-kafka:7.7.0
    container_name: nexus-kafka
    restart: unless-stopped

    ports:
      - "9092:9092"

    environment:
      # KRaft Settings
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller

      # Listeners
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092

      # Controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      # Protocol Mapping
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT

      # Single Node Dev Settings
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      # KRaft Cluster ID
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

    volumes:
      - kafka_data:/var/lib/kafka/data

    networks:
      - nexus-network



  # =========================================================
  # KAFKA UI
  # =========================================================
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: nexus-kafka-ui
    restart: unless-stopped

    depends_on:
      kafka:
        condition: service_healthy

    ports:
      - "8085:8080"

    environment:
      KAFKA_CLUSTERS_0_NAME: nexus-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

    networks:
      - nexus-network



  # =========================================================
  # PGADMIN
  # =========================================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: nexus-pgadmin
    restart: unless-stopped

    environment:
      PGADMIN_DEFAULT_EMAIL: eyueljoel21@gmail.com
      PGADMIN_DEFAULT_PASSWORD: admin123

    ports:
      - "8080:80"

    depends_on:
      postgres:
        condition: service_healthy

    volumes:
      - pgadmin_data:/var/lib/pgadmin

    networks:
      - nexus-network



# =========================================================
# NETWORKS
# =========================================================
networks:
  nexus-network:
    driver: bridge



# =========================================================
# VOLUMES
# =========================================================
volumes:
  postgres_data:
  redis_data:
  kafka_data:
  pgadmin_data: